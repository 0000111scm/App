name: Build APK S24FE

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flet==0.21.1
      - name: Build APK
        run: |
          flet build apk --org com.sandros24fe.optimizer --build-name "1.0.0" --build-number 1 --verbose
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Optimizer-S24FE
          path: build/apk/*.apk
